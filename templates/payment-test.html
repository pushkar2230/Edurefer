<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway Test - EduRefer</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .test-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }
        .test-button {
            background: #008080;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin: 10px 5px;
        }
        .test-button:hover {
            background: #006666;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            font-weight: 600;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        .status.info {
            background: #e3f2fd;
            color: #1e40af;
        }
        .log {
            background: #1a1a1a;
            color: white;
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="test-container">
            <h1>Payment Gateway Test</h1>
            <p>Test the Razorpay payment gateway integration.</p>
            
            <div class="test-section">
                <h3>Step 1: Test Order Creation</h3>
                <button class="test-button" onclick="testOrderCreation()">Create Test Order (₹500)</button>
                <div id="orderStatus" class="status" style="display: none;"></div>
            </div>
            
            <div class="test-section">
                <h3>Step 2: Test Payment Processing</h3>
                <button class="test-button" onclick="testPaymentProcessing()">Test Payment Flow</button>
                <div id="paymentStatus" class="status" style="display: none;"></div>
            </div>
            
            <div class="test-section">
                <h3>Step 3: Check Configuration</h3>
                <button class="test-button" onclick="testConfiguration()">Check Configuration</button>
                <div id="configStatus" class="status" style="display: none;"></div>
            </div>
            
            <div class="log" id="testLog">
                <h4>Test Log:</h4>
                <div id="logContent"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="simple-cart.js"></script>
    <script src="payment.js"></script>
    
    <script>
        // Set API_BASE_URL for testing
        window.API_BASE_URL = 'http://localhost:5000/api';
    </script>
    <script>
        let testOrderId = null;
        let testPaymentId = null;
        
        function log(message, type = 'info') {
            const logEl = document.getElementById('logContent');
            const timestamp = new Date().toLocaleTimeString();
            logEl.innerHTML += `${timestamp} [${type.toUpperCase()}] ${message}\n`;
            logEl.innerHTML += `[${timestamp}] [${type.toUpperCase()}] ${message}\n`;
            logEl.scrollTop = logEl.scrollHeight;
        }
        
        function showStatus(elementId, message, type = 'info') {
            const statusEl = document.getElementById(elementId);
            if (statusEl) {
                statusEl.textContent = message;
                statusEl.className = `status ${type}`;
                statusEl.style.display = 'block';
            }
        }
        
        async function testOrderCreation() {
            log('Testing order creation...', 'info');
            showStatus('orderStatus', 'Creating order...', 'info');
            
            try {
                const orderData = await window.paymentHandler.createOrder(500);
                
                if (orderData && orderData.ok) {
                    testOrderId = orderData.order_id;
                    testPaymentId = orderData.razorpay_order_id;
                    log(`Order created successfully:`, 'success');
                    log(`Order ID: ${orderData.order_id}`, 'success');
                    log(`Razorpay Order ID: ${orderData.razorpay_order_id}`, 'success');
                    log(`Amount: ₹${orderData.amount}`, 'success');
                    showStatus('orderStatus', 'Order created successfully!', 'success');
                } else {
                    log(`Order creation failed: ${orderData ? orderData.error : 'Unknown error'}`, 'error');
                    showStatus('orderStatus', `Order creation failed: ${orderData ? orderData.error : 'Unknown error'}`, 'error');
                }
            } catch (error) {
                log(`Order creation error: ${error.message}`, 'error');
                showStatus('orderStatus', `Order creation error: ${error.message}`, 'error');
            }
        }
        
        async function testPaymentProcessing() {
            log('Testing payment processing...', 'info');
            showStatus('paymentStatus', 'Testing payment flow...', 'info');
            
            if (!testOrderId || !testPaymentId) {
                log('Please create an order first', 'error');
                showStatus('paymentStatus', 'Please create an order first', 'error');
                return;
            }
            
            try {
                // Simulate successful payment
                const mockPaymentData = {
                    razorpay_order_id: testPaymentId,
                    razorpay_payment_id: 'pay_test_' + Date.now(),
                    razorpay_signature: 'test_signature'
                };
                
                const result = await window.paymentHandler.verifyPayment(mockPaymentData);
                
                if (result && result.ok) {
                    log('Payment verification successful!', 'success');
                    log(`Verification result: ${JSON.stringify(result)}`, 'success');
                    showStatus('paymentStatus', 'Payment flow completed successfully!', 'success');
                } else {
                    log(`Payment verification failed: ${result ? result.error : 'Unknown error'}`, 'error');
                    showStatus('paymentStatus', `Payment verification failed: ${result ? result.error : 'Unknown error'}`, 'error');
                }
            } catch (error) {
                log(`Payment processing error: ${error.message}`, 'error');
                showStatus('paymentStatus', `Payment processing error: ${error.message}`, 'error');
            }
        }
        
        async function testConfiguration() {
            log('Testing configuration...', 'info');
            showStatus('configStatus', 'Checking configuration...', 'info');
            
            try {
                // Check if payment handler is available
                if (window.paymentHandler) {
                    log('Payment handler is available', 'success');
                    showStatus('configStatus', 'Payment handler is loaded', 'success');
                } else {
                    log('Payment handler not available', 'error');
                    showStatus('configStatus', 'Payment handler not loaded', 'error');
                }
                
                // Check if Razorpay is loaded
                if (window.Razorpay) {
                    log('Razorpay SDK is loaded', 'success');
                    showStatus('configStatus', 'Razorpay SDK is loaded', 'success');
                } else {
                    log('Razorpay SDK not loaded', 'error');
                    showStatus('configStatus', 'Razorpay SDK not loaded', 'error');
                }
                
                // Check authentication
                const user = await checkAuth();
                if (user) {
                    log('User is authenticated', 'success');
                    showStatus('configStatus', `User authenticated: ${user.username || user.email}`, 'success');
                } else {
                    log('User not authenticated', 'error');
                    showStatus('configStatus', 'User not authenticated', 'error');
                }
                
            } catch (error) {
                log(`Configuration test error: ${error.message}`, 'error');
                showStatus('configStatus', `Configuration test error: ${error.message}`, 'error');
            }
        }
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            log('Payment test page loaded', 'info');
            testConfiguration();
        });
    </script>
</body>
</html>
